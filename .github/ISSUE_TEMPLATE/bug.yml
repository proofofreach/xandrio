name: Bug report
description: Report a reproducible Xandrio defect.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include credentials, session tokens, book files, voice references, or generated audio. For security issues, use SECURITY.md."
  - type: input
    id: version
    attributes:
      label: Version and deployment mode
      placeholder: "vX.Y.Z; native, Docker, Umbrel, or Tailscale/reverse proxy"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or screenshots
