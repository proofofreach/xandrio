name: Documentation issue
description: Report missing, incorrect, or unclear documentation.
title: "docs: "
labels: [documentation]
body:
  - type: input
    id: location
    attributes:
      label: Document or section
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is incorrect or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested correction
