name: Release container

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing signed release tag (for example v1.1.0)
        required: true
        type: string

permissions: {}

env:
  IMAGE_NAME: ghcr.io/proofofreach/alexandrio

jobs:
  verify-source:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
      - name: Validate and verify signed release tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"
          tag_object=$(git rev-parse "${RELEASE_TAG}^{tag}")
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object}" --jq '.verification.verified')" = true
      - name: Verify public repository protections
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/release/check-public-repository.mjs
      - name: Scan complete Git history for secrets
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            --output "/tmp/${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          printf '%s  %s\n' "$GITLEAKS_LINUX_X64_SHA256" "/tmp/${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "/tmp/${archive}" --directory /tmp gitleaks
          /tmp/gitleaks git --config .gitleaks.toml --redact --no-banner .
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg poppler-utils
      - run: npm ci
      - name: Verify tagged version declarations
        run: npm run release:verify -- --tag "${{ inputs.tag || github.ref_name }}"
      - run: npm run audit:release
      - run: npm run check:docker-context
      - name: Validate standard and optional-engine Compose models
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.local-engines.yml --profile local-engines config --quiet
      - run: npm run check:release-assets
      - run: npm run check:release-approvals
      - run: npm run check:release-contacts
      - name: Lint release test matrix
        run: node scripts/release/check-release-evidence.mjs
      - run: npm test
      - run: npm run verify:audio:ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
      - run: npm run sbom:npm
      - name: Generate optional Python-engine declared-dependency inventories
        run: |
          python3 -m venv /tmp/xandrio-sbom
          /tmp/xandrio-sbom/bin/python -m pip install cyclonedx-bom==7.3.0
          PATH="/tmp/xandrio-sbom/bin:$PATH" npm run sbom:python
      - run: npm run notices
      - name: Verify generated notices are current
        run: |
          git ls-files --error-unmatch THIRD_PARTY_NOTICES.md
          git diff --exit-code -- THIRD_PARTY_NOTICES.md
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-dependency-inventories
          path: |
            artifacts/xandrio-npm.cdx.json
            artifacts/xandrio-*-declared.cdx.json

  verify-local-engine-images:
    needs: verify-source
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: kokoro
            dockerfile: python/Dockerfile.kokoro
            server: /app/kokoro-server.py
          - engine: chatterbox
            dockerfile: python/Dockerfile.chatterbox
            server: /app/chatterbox-server.py
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Build optional engine image
        env:
          DOCKERFILE: ${{ matrix.dockerfile }}
          ENGINE: ${{ matrix.engine }}
        run: docker build --pull --file "$DOCKERFILE" --tag "xandrio-${ENGINE}:release-check" .
      - name: Import engine server and pinned runtime
        env:
          ENGINE: ${{ matrix.engine }}
          SERVER: ${{ matrix.server }}
        run: |
          if [[ "$ENGINE" == kokoro ]]; then
            runtime_import='from kokoro import KModel, KPipeline'
          else
            runtime_import='from chatterbox.tts_turbo import ChatterboxTurboTTS'
          fi
          docker run --rm --entrypoint python "xandrio-${ENGINE}:release-check" \
            -c "${runtime_import}; import runpy; module=runpy.run_path('${SERVER}'); assert module.get('app') is not None"
      - name: Verify non-root engine runtime and writable model cache
        env:
          ENGINE: ${{ matrix.engine }}
        run: |
          docker volume create "xandrio-${ENGINE}-runtime-check"
          trap 'docker volume rm --force "xandrio-${ENGINE}-runtime-check"' EXIT
          docker run --rm --volume "xandrio-${ENGINE}-runtime-check:/models" \
            --entrypoint sh "xandrio-${ENGINE}:release-check" -ec \
            'test "$(id -u):$(id -g)" = "1000:1000"; touch /models/runtime-check; test -f /models/runtime-check'
      - name: Generate SBOM from the installed engine environment
        env:
          ENGINE: ${{ matrix.engine }}
        run: |
          python3 -m venv /tmp/cyclonedx
          /tmp/cyclonedx/bin/python -m pip install cyclonedx-bom==7.3.0
          mkdir -p artifacts
          docker run --rm --entrypoint python "xandrio-${ENGINE}:release-check" \
            -m pip freeze --all > "artifacts/xandrio-${ENGINE}-installed.txt"
          /tmp/cyclonedx/bin/cyclonedx-py requirements \
            "artifacts/xandrio-${ENGINE}-installed.txt" \
            --output-reproducible --spec-version 1.6 --output-format JSON \
            --output-file "artifacts/xandrio-${ENGINE}-installed.cdx.json"
      - name: Verify Chatterbox reads a private Xandrio voice reference
        if: matrix.engine == 'chatterbox'
        run: |
          docker volume create xandrio-chatterbox-voice-check
          trap 'docker volume rm --force xandrio-chatterbox-voice-check' EXIT
          docker run --rm --user 0:0 --volume xandrio-chatterbox-voice-check:/app/data \
            --entrypoint sh xandrio-chatterbox:release-check -ec \
            'mkdir -p /app/data/voice-references; printf reference > /app/data/voice-references/release-check.wav; chown 1000:1000 /app/data/voice-references/release-check.wav; chmod 0600 /app/data/voice-references/release-check.wav'
          docker run --rm --volume xandrio-chatterbox-voice-check:/app/data:ro \
            --entrypoint python xandrio-chatterbox:release-check -c \
            "from pathlib import Path; assert Path('/app/data/voice-references/release-check.wav').read_text() == 'reference'"
      - name: Scan optional engine image
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          image-ref: xandrio-${{ matrix.engine }}:release-check
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installed-python-sbom-${{ matrix.engine }}
          path: artifacts/xandrio-${{ matrix.engine }}-installed.*

  build-test-candidate:
    needs: [verify-source, verify-local-engine-images]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      commit: ${{ steps.release.outputs.commit }}
      digest: ${{ steps.build.outputs.digest }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
      - name: Install container smoke-test tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg zip
      - name: Define release values
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"
          tag_object=$(git rev-parse "${RELEASE_TAG}^{tag}")
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object}" --jq '.verification.verified')" = true
          commit=$(git rev-list -n 1 "$RELEASE_TAG")
          git checkout --detach "$commit"
          version="${RELEASE_TAG#v}"
          printf 'tag=%s\nversion=%s\ncommit=%s\n' "$RELEASE_TAG" "$version" "$commit" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build once and push an immutable candidate
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:sha-${{ steps.release.outputs.commit }}
          build-args: |
            VERSION=${{ steps.release.outputs.version }}
            VCS_REF=${{ steps.release.outputs.commit }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          provenance: mode=max
          sbom: true
      - name: Verify both platforms, persistent storage, upgrade, and rollback
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          candidate="${IMAGE_NAME}@${DIGEST}"
          docker buildx imagetools inspect "${IMAGE_NAME}@${DIGEST}" --raw > manifest.json
          grep --quiet '"architecture":"amd64"' manifest.json
          grep --quiet '"architecture":"arm64"' manifest.json

          wait_for_health() {
            local port="$1"
            for attempt in $(seq 1 120); do
              if curl --fail --silent "http://127.0.0.1:${port}/health" | grep --quiet '"status":"ok"'; then
                return 0
              fi
              sleep 1
            done
            return 1
          }

          create_epub_fixture() {
            node scripts/release/create-import-smoke-epub.mjs release/import-fixture.epub
          }

          run_import_audio_check() {
            local name="$1" port="$2" platform="$3" data_dir="$4" cache_dir="$5"
            docker run --detach --name "$name" --platform "$platform" \
              --publish "127.0.0.1:${port}:8181" \
              --env XANDRIO_PREGENERATE_ON_IMPORT=false \
              --volume "${data_dir}:/app/data" --volume "${cache_dir}:/app/cache" \
              "$candidate"
            if ! wait_for_health "$port"; then
              docker logs "$name"
              return 1
            fi
            upload_response=$(curl --fail --silent --show-error \
              --form 'epub=@release/import-fixture.epub;type=application/epub+zip' \
              "http://127.0.0.1:${port}/api/upload")
            book_id=$(node -e 'const response=JSON.parse(process.argv[1]); if (!response.success || !response.bookId) process.exit(1); process.stdout.write(response.bookId)' "$upload_response")
            curl --fail --silent --show-error --location --max-time 300 \
              --output "/tmp/${name}.mp3" "http://127.0.0.1:${port}/api/audio/${book_id}/0"
            ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "/tmp/${name}.mp3" \
              | awk '$1 > 0 { valid=1 } END { exit valid ? 0 : 1 }'
            curl --fail --silent --show-error --range 0-31 --dump-header "/tmp/${name}-range-headers" \
              --output "/tmp/${name}-range-audio" "http://127.0.0.1:${port}/api/audio/${book_id}/0"
            grep --quiet '206 Partial Content' "/tmp/${name}-range-headers"
            test "$(wc -c < "/tmp/${name}-range-audio" | tr -d '[:space:]')" = 32
            docker rm --force "$name"
          }

          run_and_check() {
            local name="$1" port="$2" platform="$3" image="$4" data_dir="$5" cache_dir="$6" verify_fixture="${7:-false}"
            docker run --detach --name "$name" --platform "$platform" \
              --publish "127.0.0.1:${port}:8181" \
              --volume "${data_dir}:/app/data" --volume "${cache_dir}:/app/cache" \
              "$image"
            if ! wait_for_health "$port"; then
              docker logs "$name"
              return 1
            fi
            if [[ "$verify_fixture" == true ]]; then
              curl --fail --silent "http://127.0.0.1:${port}/api/library" | grep --quiet 'Release persistence fixture'
              curl --fail --silent "http://127.0.0.1:${port}/api/book/release-fixture" | grep --quiet 'Persisted chapter text'
              curl --fail --silent --range 0-31 --dump-header /tmp/xandrio-range-headers \
                --output /tmp/xandrio-range-audio "http://127.0.0.1:${port}/api/audio/release-fixture/0"
              grep --quiet '206 Partial Content' /tmp/xandrio-range-headers
              test "$(wc -c < /tmp/xandrio-range-audio | tr -d '[:space:]')" = 32
              docker exec "$name" sh -ec '
                set -- /app/cache/release-fixture*.mp3
                test "$#" = 1
                ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "$1" \
                  | awk '\''$1 > 0 { valid=1 } END { exit valid ? 0 : 1 }'\''
              '
            fi
            docker rm --force "$name"
          }

          seed_persistence_fixture() {
            local root="$1" data_dir="$1/data" cache_dir="$1/cache" variant_segment="${2:-}"
            mkdir -p "$data_dir/voice-references" "$cache_dir"
            cat > "$data_dir/books.json" <<'JSON'
          {"release-fixture":{"id":"release-fixture","title":"Release persistence fixture","author":"Xandrio","language":"en","path":"/app/cache/release-fixture.xbook.json","filename":"release-fixture.xbook.json","sourceFormat":"PDF","addedAt":"2026-07-12T00:00:00.000Z","chapterCount":1,"chapterDurations":[2],"totalDuration":2}}
          JSON
            cat > "$cache_dir/release-fixture.xbook.json" <<'JSON'
          {"_xbookVersion":1,"id":"release-fixture","sourceFormat":"PDF","sourceFilename":"release-fixture.pdf","sourceDeleted":true,"metadata":{"title":"Release persistence fixture","author":"Xandrio"},"chapters":[{"title":"Chapter One","type":"chapter","text":"Persisted chapter text used to verify that extracted artifacts remain readable across container restarts and release transitions. This fixture contains enough ordinary prose for the document and playback routes to load it without contacting an external provider."}]}
          JSON
            cat > "$data_dir/settings.json" <<'JSON'
          {"voice":"en-US-AndrewMultilingualNeural","operatorPolicy":{"version":1,"acknowledged":true,"acknowledgedAt":"2026-07-12T00:00:00.000Z","unverifiedSourcesEnabled":false},"releaseFixtureUnknownField":{"preserve":true}}
          JSON
            cat > "$data_dir/positions.json" <<'JSON'
          {"users":{"release-user":{"release-fixture":{"chapterIndex":0,"timestamp":12,"updatedAt":1783814400000}}}}
          JSON
            cat > "$data_dir/bookmarks.json" <<'JSON'
          {"users":{"release-user":{"release-fixture":[{"id":"bm_release_fixture","chapterIndex":0,"timestamp":8,"note":"persist","createdAt":"2026-07-12T00:00:00.000Z","createdAtMs":1783814400000}]}}}
          JSON
            cat > "$data_dir/users.json" <<'JSON'
          {"users":{"release-user":{"id":"release-user","name":"Release fixture","devices":{}}}}
          JSON
            cat > "$data_dir/client-settings.json" <<'JSON'
          {"users":{"release-user":{"defaultSpeed":1.25,"defaultSearchSources":["gutenberg"]}}}
          JSON
            cat > "$data_dir/custom-voices.json" <<'JSON'
          {"voices":[{"id":"release-voice","name":"Release voice fixture","refVersion":"fixture-v1","createdAt":"2026-07-12T00:00:00.000Z"}]}
          JSON
            cat > "$data_dir/annas-auth.json" <<'JSON'
          {"secretKey":"release-fixture-not-a-real-credential","baseUrl":"annas-archive.li"}
          JSON
            cat > "$data_dir/zlibrary-auth.json" <<'JSON'
          {"version":2,"userId":"release-fixture-user","userKey":"release-fixture-not-a-real-key","baseUrl":"https://z-library.sk","verifiedAt":"2026-07-12T00:00:00.000Z"}
          JSON
            printf 'release voice reference fixture\n' > "$data_dir/voice-references/release-voice.wav"
            if [[ -z "$variant_segment" ]]; then
              variant_segment=$(node -e "const crypto=require('crypto'); const {createNarrationEngineRegistry}=require('./lib/narration-engine-registry'); const key=createNarrationEngineRegistry({defaultChunkSize:4000,defaultConcurrency:2}).forVoice('en-US-AndrewMultilingualNeural').variantKey; process.stdout.write('_tts'+crypto.createHash('sha1').update(key).digest('hex').slice(0,10));")
            fi
            ffmpeg -hide_banner -loglevel error -f lavfi -i 'sine=frequency=440:duration=2' \
              -ac 1 -ar 24000 -b:a 160k -y "$cache_dir/release-fixture${variant_segment}_ch0.mp3"
            chmod -R a+rwX "$root"
            (cd "$root" && find data cache -type f -print0 | sort -z | xargs -0 sha256sum) > "$root/expected.sha256"
          }

          create_epub_fixture
          mkdir -p release/import-amd64/{data,cache} release/import-arm64/{data,cache}
          mkdir -p release/runtime/{data,cache} release/runtime-arm/{data,cache}
          chmod -R a+rwx release/import-amd64 release/import-arm64 release/runtime release/runtime-arm
          seed_persistence_fixture "$PWD/release/runtime"
          seed_persistence_fixture "$PWD/release/runtime-arm"
          docker pull "$candidate"

          run_import_audio_check xandrio-import-amd64 8184 linux/amd64 \
            "$PWD/release/import-amd64/data" "$PWD/release/import-amd64/cache"
          run_import_audio_check xandrio-import-arm64 8185 linux/arm64 \
            "$PWD/release/import-arm64/data" "$PWD/release/import-arm64/cache"

          docker tag "$candidate" "xandrio:${{ steps.release.outputs.version }}"
          docker compose up --detach --no-build
          if ! wait_for_health 8181; then
            docker compose logs xandrio
            exit 1
          fi
          docker compose exec --no-TTY xandrio sh -c 'touch /app/data/compose-write-check /app/cache/compose-cache-write-check'
          docker compose down
          docker compose up --detach --no-build
          if ! wait_for_health 8181; then
            docker compose logs xandrio
            exit 1
          fi
          docker compose exec --no-TTY xandrio test -f /app/data/compose-write-check
          docker compose exec --no-TTY xandrio test -f /app/cache/compose-cache-write-check
          docker compose down --volumes

          run_and_check xandrio-amd64 8181 linux/amd64 "$candidate" \
            "$PWD/release/runtime/data" "$PWD/release/runtime/cache" true
          run_and_check xandrio-restart 8181 linux/amd64 "$candidate" \
            "$PWD/release/runtime/data" "$PWD/release/runtime/cache" true
          (cd release/runtime && sha256sum --check expected.sha256)

          run_and_check xandrio-arm64 8182 linux/arm64 "$candidate" \
            "$PWD/release/runtime-arm/data" "$PWD/release/runtime-arm/cache" true
          (cd release/runtime-arm && sha256sum --check expected.sha256)

          if docker manifest inspect "${IMAGE_NAME}:stable" >/dev/null 2>&1; then
            docker pull "${IMAGE_NAME}:stable"
            previous=$(docker image inspect "${IMAGE_NAME}:stable" --format '{{index .RepoDigests 0}}')
            rm -rf release/compatibility
            mkdir -p release/compatibility/{data,cache}
            chmod -R a+rwx release/compatibility
            previous_variant_segment=$(docker run --rm --entrypoint node "$previous" -e "const crypto=require('crypto'); const {createNarrationEngineRegistry}=require('/app/lib/narration-engine-registry'); const key=createNarrationEngineRegistry({defaultChunkSize:4000,defaultConcurrency:2}).forVoice('en-US-AndrewMultilingualNeural').variantKey; process.stdout.write('_tts'+crypto.createHash('sha1').update(key).digest('hex').slice(0,10));")
            seed_persistence_fixture "$PWD/release/compatibility" "$previous_variant_segment"
            run_and_check xandrio-before-upgrade 8183 linux/amd64 "$previous" \
              "$PWD/release/compatibility/data" "$PWD/release/compatibility/cache" true
            run_and_check xandrio-upgrade 8183 linux/amd64 "$candidate" \
              "$PWD/release/compatibility/data" "$PWD/release/compatibility/cache" true
            run_and_check xandrio-rollback 8183 linux/amd64 "$previous" \
              "$PWD/release/compatibility/data" "$PWD/release/compatibility/cache" true
            (cd release/compatibility && sha256sum --check expected.sha256)
            printf 'Upgrade and rollback health check passed against %s\n' "$previous"
            printf 'DATA-02: prior stable -> candidate -> prior stable verification passed against %s.\n' "$previous" > release/RELEASE_DATA_GATE.txt
          else
            rm -rf release/first-release
            mkdir -p release/first-release/{data,cache,backup}
            chmod -R a+rwx release/first-release
            seed_persistence_fixture "$PWD/release/first-release"
            (cd release/first-release && tar --create --gzip --file backup/first-release-data-cache.tar.gz data cache)
            (cd release/first-release && sha256sum backup/first-release-data-cache.tar.gz > backup/SHA256SUMS)
            cp release/first-release/expected.sha256 release/first-release/backup/expected.sha256
            printf 'Created first-release backup and checksum.\n' | tee release/first-release/backup/restore.log

            restore_first_release_volumes() {
              local suffix="$1" data_volume="xandrio-first-data-${suffix}" cache_volume="xandrio-first-cache-${suffix}"
              (cd release/first-release/backup && sha256sum --check SHA256SUMS >&2)
              docker volume rm --force "$data_volume" "$cache_volume" >/dev/null 2>&1 || true
              docker volume create "$data_volume" >/dev/null
              docker volume create "$cache_volume" >/dev/null
              docker run --rm --user 0:0 \
                --volume "$data_volume:/app/data" --volume "$cache_volume:/app/cache" \
                --volume "$PWD/release/first-release/backup:/backup:ro" \
                --entrypoint sh "$candidate" -ec '
                  rm -rf /tmp/restore && mkdir -p /tmp/restore
                  tar --extract --gzip --file /backup/first-release-data-cache.tar.gz -C /tmp/restore
                  cp -a /tmp/restore/data/. /app/data/
                  cp -a /tmp/restore/cache/. /app/cache/
                  chown -R 1000:1000 /app/data /app/cache
                '
              printf '%s;%s\n' "$data_volume" "$cache_volume"
            }

            verify_first_release_volumes() {
              local data_volume="$1" cache_volume="$2"
              docker run --rm --user 0:0 \
                --volume "$data_volume:/verify/data:ro" --volume "$cache_volume:/verify/cache:ro" \
                --volume "$PWD/release/first-release/backup:/backup:ro" \
                --entrypoint sh "$candidate" -ec 'cd /verify && sha256sum --check /backup/expected.sha256'
            }

            IFS=';' read -r first_data first_cache < <(restore_first_release_volumes first)
            run_and_check xandrio-first-release-restore 8183 linux/amd64 "$candidate" \
              "$first_data" "$first_cache" true
            verify_first_release_volumes "$first_data" "$first_cache"
            printf 'Verified candidate against clean first-release restore.\n' | tee -a release/first-release/backup/restore.log

            IFS=';' read -r repeat_data repeat_cache < <(restore_first_release_volumes repeat)
            run_and_check xandrio-first-release-restore-repeat 8183 linux/amd64 "$candidate" \
              "$repeat_data" "$repeat_cache" true
            verify_first_release_volumes "$repeat_data" "$repeat_cache"
            docker volume rm --force "$first_data" "$first_cache" "$repeat_data" "$repeat_cache" >/dev/null
            printf 'Verified repeat clean restore against candidate.\n' | tee -a release/first-release/backup/restore.log
            printf 'FIRST-01: checksummed backup -> clean restore -> candidate verification -> repeat restore verification passed.\n' > release/RELEASE_DATA_GATE.txt
          fi
      - name: Scan the tested digest
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Render digest-pinned Umbrel release bundle
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: node scripts/release/render-umbrel-release.mjs --tag "$RELEASE_TAG" --digest "$DIGEST"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: umbrel-${{ steps.release.outputs.version }}
          path: release/umbrel
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign the tested digest with GitHub OIDC
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
      - name: Verify anonymous pull of the exact candidate digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          docker logout ghcr.io
          docker image rm "${IMAGE_NAME}@${DIGEST}" || true
          docker pull "${IMAGE_NAME}@${DIGEST}"
      - name: Write candidate evidence for owner review
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          RELEASE_COMMIT: ${{ steps.release.outputs.commit }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          cat > release/CANDIDATE_EVIDENCE.md <<EOF
          # Xandrio ${RELEASE_TAG} candidate evidence

          - Commit: \`${RELEASE_COMMIT}\`
          - OCI digest: \`${DIGEST}\`
          - Candidate tag: \`${IMAGE_NAME}:sha-${RELEASE_COMMIT}\`
          - Platforms: \`linux/amd64\`, \`linux/arm64\`
          - Workflow evidence: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          | Gate | Result from this run | Evidence or remaining requirement |
          | --- | --- | --- |
          | SRC-01 | Pass | verify-source: tests, Chromium smoke, calibrated audio, audit, notices, history, asset, approval, and matrix-definition gates |
          | OCI-01 | Pass | amd64 exact-digest import, live Edge narration, playable audio, and Range check |
          | OCI-02 | Pass | arm64 exact-digest import, live Edge narration, playable audio, and Range check |
          | OCI-03 | Pass | exact-digest Trivy scan, build SBOM/provenance, OIDC signature, and anonymous pull |
          | DATA-01 | Pass | restart fixture and checksums on amd64 and arm64 |
          | DATA-02 / FIRST-01 | Pass | $(cat release/RELEASE_DATA_GATE.txt) |
          | BROW-01 | Pass | verify-source browser smoke |
          | FMT-01 | Partial; reviewer required | synthetic EPUB import and playback pass on both OCI architectures; complete metadata, chapter, seek, and delete acceptance before approval |
          | TTS-01 | Partial; reviewer required | live Edge generation passes in both OCI smoke paths; verify disabled/failed Edge and local-engine/upload continuity before approval |
          | Optional-engine build safety | Pass | installed-environment SBOMs, UID/GID 1000, model-cache write, private 0600 Chatterbox reference read |
          | IOS-01, LAN-01, NET-01, UMB-01 | Reviewer required | Run exact-digest/manual deployment matrix before environment approval |
          | FMT-02, FMT-03 | Reviewer required | Run PDF/OCR and Kindle-family fixture matrix before environment approval |
          | TTS-02, TTS-03 | Reviewer required | CI does not download models or claim optional-engine synthesis; run supported-architecture synthesis matrix |
          | PROV-01, PROV-02, SEC-01 | Reviewer required | Complete approved live-provider and security review without publishing private data |

          Promotion requires a protected GitHub \`release\` environment reviewer
          to link completed manual/exact-digest evidence for this commit and digest.
          Workflow success alone is insufficient.
          EOF
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: candidate-evidence-${{ steps.release.outputs.version }}
          path: release/CANDIDATE_EVIDENCE.md
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: first-release-restore-evidence-${{ steps.release.outputs.version }}
          path: release/first-release/backup/
          if-no-files-found: ignore

  promote-release:
    needs: [verify-source, build-test-candidate]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: release
      url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.build-test-candidate.outputs.tag }}
          fetch-depth: 0
      - name: Reverify the signed tag and exact release commit
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.build-test-candidate.outputs.commit }}
          RELEASE_TAG: ${{ needs.build-test-candidate.outputs.tag }}
        run: |
          tag_object=$(git rev-parse "${RELEASE_TAG}^{tag}")
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object}" --jq '.verification.verified')" = true
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$RELEASE_COMMIT"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote only the owner-approved tested digest
        env:
          DIGEST: ${{ needs.build-test-candidate.outputs.digest }}
          RELEASE_VERSION: ${{ needs.build-test-candidate.outputs.version }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${RELEASE_VERSION}" \
            --tag "${IMAGE_NAME}:stable" \
            "${IMAGE_NAME}@${DIGEST}"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: umbrel-${{ needs.build-test-candidate.outputs.version }}
          path: release/umbrel
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: source-dependency-inventories
          path: release/files
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: installed-python-sbom-*
          path: release/files
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: candidate-evidence-${{ needs.build-test-candidate.outputs.version }}
          path: release/files
      - name: Create checksummed source and Umbrel release artifacts
        env:
          RELEASE_COMMIT: ${{ needs.build-test-candidate.outputs.commit }}
          RELEASE_VERSION: ${{ needs.build-test-candidate.outputs.version }}
        run: |
          mkdir -p release/files
          git archive --format=tar.gz --prefix="xandrio-${RELEASE_VERSION}/" \
            --output="release/files/xandrio-${RELEASE_VERSION}.tar.gz" "$RELEASE_COMMIT"
          tar -czf "release/files/xandrio-umbrel-${RELEASE_VERSION}.tar.gz" -C release/umbrel .
          (cd release/files && sha256sum ./* > SHA256SUMS)
      - name: Publish GitHub release from the verified signed tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build-test-candidate.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/files/* --clobber
          else
            gh release create "$RELEASE_TAG" release/files/* --verify-tag --generate-notes
          fi
