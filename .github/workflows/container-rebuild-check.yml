name: Scheduled pinned-base rebuild and scan

on:
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rebuild-and-scan:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Rebuild pinned base with current Debian packages
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          pull: true
          push: false
          tags: xandrio:scheduled-${{ matrix.arch }}
          build-args: |
            VERSION=scheduled-check
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
      - name: Execute rebuilt image
        env:
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          docker run --detach --name xandrio-scheduled --platform "$PLATFORM" \
            --publish 127.0.0.1:8181:8181 "xandrio:scheduled-${ARCH}"
          trap 'docker logs xandrio-scheduled; docker rm --force xandrio-scheduled' EXIT
          for attempt in $(seq 1 120); do
            if curl --fail --silent http://127.0.0.1:8181/health | grep --quiet '"status":"ok"'; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Scan rebuilt image
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          image-ref: xandrio:scheduled-${{ matrix.arch }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
